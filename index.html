<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eurasia Spelling Bee Trainer</title>
  <style>
    :root {
      --primary: #2980b9;
      --bg: #f0f4f8;
      --card-bg: #ffffff;
      --text: #334455;
      --muted: #8899aa;
      --border: #dbe2e8;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 650px;
    }

    /* Header Section */
    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .app-header h1 {
      font-size: 1.2rem;
      margin: 0;
      color: var(--primary);
    }

    .nav-btn {
      background: white;
      border: 1px solid var(--border);
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      color: var(--text);
      transition: all 0.2s;
    }

    .nav-btn:hover { background: #f8f9fa; }

    /* Category Filters */
    .filter-bar {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 12px;
      margin-bottom: 20px;
      scrollbar-width: thin;
    }

    .filter-bar::-webkit-scrollbar { height: 6px; }
    .filter-bar::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }

    .btn-topic {
      background: white;
      border: 1px solid var(--border);
      padding: 8px 18px;
      border-radius: 20px;
      white-space: nowrap;
      cursor: pointer;
      color: var(--muted);
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .btn-topic.active {
      background: #eef5ff;
      border-color: var(--primary);
      color: var(--primary);
      font-weight: bold;
    }

    /* Main Flashcard */
    .card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      margin-bottom: 25px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .topic-tag {
      background: #f1f3f5;
      padding: 4px 12px;
      border-radius: 12px;
      font-weight: bold;
    }

    /* Interaction Steps */
    .step-box {
      background: #fafbfc;
      border: 1px solid #f0f2f5;
      border-radius: 16px;
      padding: 25px;
      text-align: center;
      margin-bottom: 20px;
    }

    .label {
      font-size: 0.75rem;
      font-weight: 800;
      color: #f39c12;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 15px;
      display: block;
    }

    .audio-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .btn-main-listen {
      background: var(--primary);
      color: white;
      border: none;
      padding: 16px 40px;
      border-radius: 50px;
      font-size: 1.5rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(41, 128, 185, 0.3);
      width: 80%;
      max-width: 280px;
      transition: transform 0.1s;
    }
    .btn-main-listen:active { transform: scale(0.95); }

    .btn-slow {
      background: none;
      border: 1px solid #ccc;
      margin-top: 10px;
      padding: 6px 20px;
      border-radius: 15px;
      cursor: pointer;
      font-size: 0.8rem;
      color: var(--muted);
      transition: background 0.2s;
    }
    .btn-slow:hover { background: #eee; }

    /* Clue Grid */
    .clue-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    @media (max-width: 450px) {
      .clue-grid { grid-template-columns: 1fr; }
    }

    .clue-item {
      border: 1px dashed #ccd5db;
      border-radius: 12px;
      padding: 15px 10px;
      text-align: center;
      cursor: pointer;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-size: 0.8rem;
      background: #fff;
      color: var(--muted);
      transition: background 0.2s;
    }

    .clue-item:hover { background: #f9f9f9; border-color: #aaa; }

    .clue-item.revealed {
      border-style: solid;
      border-color: var(--primary);
      color: var(--text);
      background: #fff;
    }

    .clue-icon { font-size: 1.5rem; margin-bottom: 5px; opacity: 0.8; }

    /* Spelling Reveal */
    .spelling-reveal {
      font-size: 2.2rem;
      font-weight: 800;
      min-height: 60px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      text-transform: capitalize;
    }

    .spelling-hidden {
      font-size: 1rem;
      background: #eee;
      color: #999;
      padding: 12px 30px;
      border-radius: 12px;
      text-transform: none;
      user-select: none;
    }

    /* Assessment */
    .action-row {
      display: flex;
      gap: 15px;
      margin-top: 20px;
    }

    .btn-action {
      flex: 1;
      border: none;
      padding: 18px;
      border-radius: 15px;
      font-weight: bold;
      cursor: pointer;
      font-size: 1rem;
      transition: opacity 0.2s;
    }
    .btn-action:hover { opacity: 0.8; }

    .btn-wrong { background: #ffebeb; color: #e74c3c; }
    .btn-right { background: #e6f9ec; color: #27ae60; }

    /* Footer */
    .footer {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 25px;
      margin-top: 25px;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Header -->
    <header class="app-header">
      <button class="nav-btn" onclick="location.reload()">🏠 Home</button>
      <h1>Spelling Bee Prep</h1>
      <button class="nav-btn" onclick="shuffleCards()">🔀 Shuffle</button>
    </header>

    <!-- Dynamic Filter Bar -->
    <nav class="filter-bar" id="topic-filters">
      <!-- Buttons are generated automatically here -->
    </nav>

    <!-- Main Flashcard Area -->
    <main class="card">
      <div class="card-meta">
        <span id="counter">Loading...</span>
        <span class="topic-tag" id="current-topic">Topic</span>
      </div>

      <!-- Step 1: Listen First -->
      <section class="step-box">
        <span class="label">Step 1 — Listen Carefully</span>
        <div class="audio-controls">
          <button class="btn-main-listen" onclick="speak(1)">🔊 Listen</button>
          <button class="btn-slow" onclick="speak(0.6)">🐌 Slow</button>
        </div>
      </section>

      <!-- Clues Middle Section -->
      <section class="clue-grid">
        <div class="clue-item" id="clue-pos" onclick="revealClue('pos')">
          <div class="clue-icon">🧩</div>
          <div>PART OF SPEECH</div>
        </div>
        <div class="clue-item" id="clue-def" onclick="revealClue('def')">
          <div class="clue-icon">📖</div>
          <div>MEANING</div>
        </div>
        <div class="clue-item" id="clue-sen" onclick="revealClue('sen')">
          <div class="clue-icon">💬</div>
          <div>SENTENCE</div>
        </div>
      </section>

      <!-- Step 2: Reveal Spelling Bottom Section -->
      <section class="step-box">
        <span class="label">Step 2 — Reveal Spelling</span>
        <div class="spelling-reveal spelling-hidden" id="spelling-box" onclick="revealSpelling()">
          👁️ Tap to reveal spelling
        </div>
      </section>

      <!-- Correct / Incorrect Assessment -->
      <div class="action-row">
        <button class="btn-action btn-wrong" onclick="nextWord()">❌ Incorrect</button>
        <button class="btn-action btn-right" onclick="nextWord()">✅ Correct</button>
      </div>
    </main>

    <!-- Footer Navigation -->
    <footer class="footer">
      <button class="nav-btn" onclick="prevWord()">← Prev</button>
      <span id="progress-text" style="font-weight: 600; color: var(--muted);">0 / 0</span>
      <button class="nav-btn" onclick="nextWord()">Next →</button>
    </footer>
  </div>
  </body>
</html>
